# Nightshift task config for goharbor/harbor (8gcr fork)
# https://github.com/8gears/harbor

tasks:
  enabled:
    - lint
    - docs
    - security
    - test-gaps
    - harbor-patch-health
    - harbor-migration-verify
    - harbor-api-drift
    - harbor-controller-tests
  priorities:
    lint: 1
    security: 2
    docs: 3
  custom:
    - type: harbor-patch-health
      name: "8gcr Patch Stack Health Check"
      description: |
        Validate that all patches in 8gcr-ee/patches/ apply cleanly against the
        current main branch using `stg import -3 -S 8gcr-ee/patches/series` in a
        throwaway worktree. Report any patches that fail to apply, produce merge
        conflicts, or leave the working tree dirty. Also verify the series file
        lists every .patch file in the directory with no orphans or missing entries.
        Do NOT commit anything — output a summary analysis only.
      category: analysis
      cost_tier: medium
      risk_level: low
      interval: "24h"

    - type: harbor-migration-verify
      name: "DB Migration Sequence Verifier"
      description: |
        Audit every SQL file under make/migrations/postgresql/ for:
        1. Sequence gaps or duplicates in the NNNN_ numeric prefix.
        2. Files that don't follow the naming convention NNNN_version_description.up.sql.
        3. Any migration that references a table or column not yet created by a prior
           migration (simple forward-reference scan — grep-level, not full SQL parse).
        4. Migrations added out of order relative to git history (git log --follow).
        Report findings as a markdown table. Open a PR only if there are fixable naming
        issues; otherwise open a GitHub issue with the full report.
      category: analysis
      cost_tier: medium
      risk_level: low
      interval: "48h"

    - type: harbor-api-drift
      name: "OpenAPI ↔ Handler Drift Detector"
      description: |
        Compare the routes declared in api/v2.0/swagger.yaml against the handler
        implementations in src/server/v2.0/handler/. For each operationId in the spec:
        1. Check that a corresponding Go handler function exists and is registered.
        2. Flag required request parameters or body fields that the handler ignores.
        3. Flag response codes defined in the spec but never returned by the handler.
        Do not touch auto-generated files in src/server/v2.0/restapi/ — those are
        regenerated by `task build:gen-apis`. Output findings as a GitHub issue with
        a prioritised list (missing handlers first, then parameter mismatches).
      category: analysis
      cost_tier: medium
      risk_level: low
      interval: "72h"

    - type: harbor-controller-tests
      name: "Controller Layer Test Backfill"
      description: |
        Find controller packages under src/controller/ that have zero or minimal
        unit tests (less than 20% function coverage by file count heuristic — count
        exported functions vs *_test.go test functions). For the two lowest-covered
        packages, write table-driven Go tests using the existing mock infrastructure
        in src/testing/. Follow these rules:
        - Use testify/suite if the package already uses it, otherwise plain testing.T.
        - Mock external dependencies via existing interfaces in src/testing/mock/.
        - Each test function must have at least a happy-path and one error-path case.
        - Run `task test:unit` to verify tests pass before opening the PR.
        Open a single PR per package, titled "test(controller/<pkg>): add unit tests".
      category: pr
      cost_tier: high
      risk_level: medium
      interval: "72h"

integrations:
  claude_md: true
  agents_md: true
  task_sources:
    - td:
        enabled: true
        teach_agent: true
